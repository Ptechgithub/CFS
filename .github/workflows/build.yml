name: Build and Upload Go Binaries to Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin, android]
        goarch: [amd64, arm64]

        exclude:
          - goos: android
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: |

          mkdir -p build

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          if [ "${{ matrix.goos }}" = "android" ]; then

            GOOS=android \
            GOARCH=${{ matrix.goarch }} \
            CGO_ENABLED=0 \
            go build \
              -ldflags="-s -w" \
              -o build/CFS-android-${{ matrix.goarch }}

          else

            GOOS=${{ matrix.goos }} \
            GOARCH=${{ matrix.goarch }} \
            CGO_ENABLED=0 \
            go build \
              -ldflags="-s -w" \
              -o build/CFS-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}

          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}