name: Build and Upload Go Binaries to Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:

          - goos: linux
            goarch: amd64

          - goos: linux
            goarch: arm64

          - goos: windows
            goarch: amd64

          - goos: windows
            goarch: arm64

          - goos: darwin
            goarch: amd64

          - goos: darwin
            goarch: arm64

          - goos: android
            goarch: arm64

          - goos: android
            goarch: arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          go build \
            -ldflags="-s -w" \
            -o build/CFS-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}